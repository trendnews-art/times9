<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【続き】駅員に頭突きして辺りは騒然・・・</title>

    <meta property="og:title" content="【続き】駅員に頭突きして辺りは騒然・・・">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="https://trendnews-art.github.io/times9/IMG_2835.jpeg"> 
    <meta property="og:url" content="https://trendnews-art.github.io/times9/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        
        /* 💡 変更点①：カード全体をリンクにするための設定を追加 */
        .card {
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            padding-bottom: 30px;
            
            /* 下記を追加してリンクとしての見た目・挙動を整えます */
            text-decoration: none; /* リンク特有の下線を消す */
            color: inherit; /* テキストの色を通常通りにする */
            display: block; /* ブロック要素として扱う */
            -webkit-tap-highlight-color: transparent; /* スマホでタップした時の青い枠を消す */
            transition: transform 0.2s; /* タップした時のアニメーション用 */
        }
        
        /* 💡 おまけ：スマホでタップした時にカードが少し沈むエフェクトをつけると押し心地が良くなります */
        .card:active {
            transform: scale(0.98);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .card h2 {
            font-size: 18px;
            color: #333;
            margin: 20px 15px;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #7c83fd, #9656fa);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            width: 70%;
            box-sizing: border-box;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <a href="https://lite.tiktok.com/t/ZS98SWXG4J5q6-QIWCJ/" class="card">
        <img src="IMG_2835.jpeg" alt="ニュース画像">
        
        <h2>【続き】駅員に頭突きして辺りは騒然・・・</h2>
        
        <div class="btn">➔ タップして視聴する</div>
    </a>

</body>
</html>
