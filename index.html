<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【続き】駅員に頭突きして辺りは騒然・・・</title>

    <meta property="og:title" content="【続き】駅員に頭突きして辺りは騒然・・・">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="https://trendnews-art.github.io/times9/IMG_2835.jpeg"> 
    <meta property="og:url" content="https://trendnews-art.github.io/times9/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            flex-direction: column; /* バナー表示用に縦並びにする */
        }
        
        /* 💡 アプリ内ブラウザで開かれた時の案内バナー用デザイン */
        #iab-warning {
            display: none; /* 初期状態は非表示 */
            background-color: #ff4c4c;
            color: white;
            width: 100%;
            text-align: center;
            padding: 12px 10px;
            font-size: 14px;
            font-weight: bold;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card {
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            padding-bottom: 30px;
            text-decoration: none;
            color: inherit;
            display: block;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s;
            margin-top: 60px; /* バナーとかぶらないように余白を作る */
        }
        
        .card:active {
            transform: scale(0.98);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .card h2 {
            font-size: 18px;
            color: #333;
            margin: 20px 15px;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #7c83fd, #9656fa);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            width: 70%;
            box-sizing: border-box;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="iab-warning">
        ⚠️ アプリがうまく開かない場合<br>
        右上の「･･･」から「ブラウザで開く」を選んでください
    </div>

    <a href="https://lite.tiktok.com/t/ZS98SWXG4J5q6-QIWCJ/" class="card" target="_blank" rel="noopener noreferrer">
        <img src="IMG_2835.jpeg" alt="ニュース画像">
        
        <h2>【続き】駅員に頭突きして辺りは騒然・・・</h2>
        
        <div class="btn">➔ タップして視聴する</div>
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            // スレッズ、Instagram、FB、LINEなどの内部ブラウザ特有の文字列を検知
            var isIAB = (ua.indexOf("Instagram") > -1) || 
                        (ua.indexOf("FBAN") > -1) || 
                        (ua.indexOf("FBAV") > -1) || 
                        (ua.indexOf("Threads") > -1) || 
                        (ua.indexOf("Line") > -1);
            
            if (isIAB) {
                // アプリ内ブラウザの場合は警告バナーを表示
                document.getElementById('iab-warning').style.display = 'block';
            } else {
                // 通常のブラウザの場合はカードの位置を元に戻す
                document.querySelector('.card').style.marginTop = '0';
            }
        });
    </script>

</body>
</html>
